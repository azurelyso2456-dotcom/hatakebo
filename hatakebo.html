/* ══════════════════════════════════════
   帳簿セル（方眼紙スタイル）
══════════════════════════════════════ */
const CELL = 68;

function LedgerCell({ vid, dateRec, warn, selected, inactive, ridge, onClick, coord }) {
  if (inactive) {
    return (
      <div style={{
        width:CELL, height:CELL, flexShrink:0,
        background:"transparent",
        border:"1px dashed " + C.inkLine,
        borderRadius:2,
        opacity:0.4,
      }}/>
    );
  }

  const vg = vid ? VM[vid] : null;
  const bg = ridge  ? "#e8e0c8"
           : selected ? C.indigoPale
           : C.paper;
  const bdColor = selected ? C.indigo
                : ridge    ? C.inkBorder
                : warn === "danger"  ? C.red
                : warn === "caution" ? C.orange
                : C.inkLine;
  const bdW = selected || warn ? 2 : 1;
  const dateStr = dateRec && dateRec.month
    ? (dateRec.month + "月" + (dateRec.day ? dateRec.day + "日" : ""))
    : null;

  return (
    <div onClick={onClick} style={{
      width:CELL, height:CELL, flexShrink:0, position:"relative",
      background:bg,
      border:bdW + "px solid " + bdColor,
      borderRadius:2, cursor:"pointer",
      boxShadow: selected ? "inset 0 0 0 1px " + C.indigo : "none",
      transition:"background .1s",
    }}>
      {/* 細い内側罫線（方眼紙感） */}
      <div style={{ position:"absolute", inset:0, pointerEvents:"none",
        backgroundImage:"linear-gradient(rgba(180,160,120,0.12) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,120,0.12) 1px,transparent 1px)",
        backgroundSize:"16px 16px",
      }}/>

      {/* 植物スタンプ */}
      {vg && (
        <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:0 }}>
          <VeggieStamp id={vg.id} size={dateStr ? 38 : 46}/>
          <div style={{ fontSize:8, color:C.ink, fontFamily:HAND, letterSpacing:.5, lineHeight:1.2, marginTop:1, textAlign:"center", fontWeight:"bold" }}>{vg.name}</div>
          {dateStr && (
            <div style={{ fontSize:7, color:C.indigo, fontFamily:HAND, letterSpacing:.3, lineHeight:1, marginTop:1 }}>{dateStr}</div>
          )}
        </div>
      )}

      {/* 空セル：十字ガイド */}
      {!vg && (
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", opacity:.25 }}>
          <span style={{ fontSize:18, color:C.inkFaint }}>＋</span>
        </div>
      )}

      {/* 座標ラベル */}
      <div style={{ position:"absolute", bottom:2, right:3, fontSize:7, color:C.inkFaint, fontFamily:SANS, lineHeight:1 }}>{coord}</div>

      {/* 畝マーク */}
      {ridge && ridge.isFirst && (
        <div style={{ position:"absolute", top:3, left:3, background:C.inkFaint, color:C.paper, borderRadius:2, padding:"1px 4px", fontSize:7, fontFamily:HAND, letterSpacing:.5 }}>畝</div>
      )}

      {/* 警告朱印 */}
      {warn && (
        <div style={{ position:"absolute", top:3, right:3, width:16, height:16, borderRadius:"50%",
          border:"2px solid " + (warn === "danger" ? C.red : C.orange),
          color: warn === "danger" ? C.red : C.orange,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:9, fontWeight:"bold", fontFamily:HAND,
          background: warn === "danger" ? C.redPale : C.orangePale,
        }}>!</div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════

══════════════════════════════════════ */
function Hanko({ text, sub, color }) {

   ヘルパー
══════════════════════════════════════ */
function makeGrid(rows, cols, fn) {
  const f = fn || function(){ return true; };
  return Array.from({length:rows}, function(_,r){
    return Array.from({length:cols}, function(_,c){ return f(r,c); });
  });
}
/* rec は文字列 or {vid,month,day} の両方に対応 */
function extractVid(rec) {
  if (!rec) return null;
  return typeof rec === "object" ? rec.vid : rec;
}
function checkRot(fid, key, year, pls) {
  const d = pls[fid] || {};
  const id = extractVid(d[year] && d[year][key]);
  if (!id) return null;
  const fam = VM[id] && VM[id].family;
  if (!fam) return null;
  let n = 1;
  for (let y = 1; y <= 2; y++) {
    const p = extractVid(d[year-y] && d[year-y][key]);
    if (p && VM[p] && VM[p].family === fam) n++; else break;
  }
  return n >= 3 ? "danger" : n >= 2 ? "caution" : null;
}
function checkPrev(fid, key, vid, year, pls) {
  if (!vid) return null;
  const fam = VM[vid] && VM[vid].family;
  if (!fam) return null;
  const d = pls[fid] || {};
  let n = 1;
  for (let y = 1; y <= 2; y++) {
    const p = extractVid(d[year-y] && d[year-y][key]);
    if (p && VM[p] && VM[p].family === fam) n++; else break;
  }
  return n >= 3 ? "danger" : n >= 2 ? "caution" : null;
}
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function buildRL(fy) {
  const lk = {};
  Object.values(fy || {}).forEach(function(ridge) {
    const r1=ridge.r1, c1=ridge.c1, r2=ridge.r2, c2=ridge.c2, ori=ridge.orientation;
    if (ori === "H") {
      for (let c=c1; c<=c2; c++) lk[r1+"-"+c]={ridge:ridge,pos:c-c1,tot:c2-c1+1,isFirst:c===c1,isLast:c===c2};
    } else {
      for (let r=r1; r<=r2; r++) lk[r+"-"+c1]={ridge:ridge,pos:r-r1,tot:r2-r1+1,isFirst:r===r1,isLast:r===r2};
    }
  });
  return lk;
}

function HatakeApp() {
  /* ── localStorage からデータを読み込む（初回のみ） ── */
  const [screen, setScreen] = useState(function(){
    try {
      const saved = localStorage.getItem("hatakebo_data");
      if (saved) {
        const d = JSON.parse(saved);
        if (d.farms && d.farms.length > 0) return "map";
      }
    } catch(e) {}
    return "setup";
  });
  const [farms, setFarms] = useState(function(){
    try {
      const saved = localStorage.getItem("hatakebo_data");
      if (saved) { const d = JSON.parse(saved); return d.farms || []; }
    } catch(e) {}
    return [];
  });
  const [plantings, setPlantings] = useState(function(){
    try {
      const saved = localStorage.getItem("hatakebo_data");
      if (saved) { const d = JSON.parse(saved); return d.plantings || {}; }
    } catch(e) {}
    return {};
  });
  const [ridges, setRidges] = useState(function(){
    try {
      const saved = localStorage.getItem("hatakebo_data");
      if (saved) { const d = JSON.parse(saved); return d.ridges || {}; }
    } catch(e) {}
    return {};
  });

  /* ── データが変わるたびに自動保存 ── */
  useEffect(function(){
    try {
      localStorage.setItem("hatakebo_data", JSON.stringify({ farms:farms, plantings:plantings, ridges:ridges }));
    } catch(e) {}
  }, [farms, plantings, ridges]);

  /* ── バックアップ：JSONファイルとしてダウンロード ── */
  function exportData() {
    const data = JSON.stringify({ farms:farms, plantings:plantings, ridges:ridges }, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = "hatakebo_backup_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── 復元：JSONファイルを読み込む ── */
  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.farms) { alert("このファイルはハタケボのバックアップではありません"); return; }
        setFarms(d.farms || []);
        setPlantings(d.plantings || {});
        setRidges(d.ridges || {});
        if (d.farms && d.farms.length > 0) setScreen("map");
        alert("データを読み込みました！");
      } catch(err) {
        alert("ファイルの読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function onComplete(farm) {
    setFarms(function(prev){
      const ex = prev.find(function(f){ return f.id===farm.id; });
      if (ex) return prev.map(function(f){ return f.id===farm.id?farm:f; });
      return [...prev, farm];
    });
    setScreen("map");
  }

  if (screen === "setup") {
    return <FarmSetup farms={farms} onComplete={onComplete} onSkip={farms.length>0?function(){setScreen("map");}:null}/>;
  }
  return <FarmMap farms={farms} plantings={plantings} setPlantings={setPlantings} ridges={ridges} setRidges={setRidges}
    onAddFarm={function(){setScreen("setup");}}
    onDeleteFarm={function(fid){
      setFarms(function(prev){ return prev.filter(function(f){ return f.id!==fid; }); });
      setPlantings(function(prev){ const n=Object.assign({},prev); delete n[fid]; return n; });
      setRidges(function(prev){ const n=Object.assign({},prev); delete n[fid]; return n; });
    }}
    onExport={exportData} onImport={importData}/>;
}

        {sn === "shape" && (

              <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>

            {/* 目印マップ */}

              <LandmarkEditor

            </p>

              const lm = landmarks[editLM.key];
              if (!lm) return null;
              return (
                <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(28,20,8,0.5)", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}
                  onClick={function(){ setEditLM(null); }}>
                  <div onClick={function(e){ e.stopPropagation(); }}
                    style={{ background:C.paper, border:"2px solid " + C.ink, padding:"28px 24px", width:"100%", maxWidth:340, boxShadow:"4px 4px 0 " + C.inkFaint }}>

                      <div style={{ fontSize:12, color:C.inkFaint, fontFamily:HAND }}>{lm.label}</div>

                    <input autoFocus value={editLM.memo||""} onChange={function(e){ setEditLM(function(p){ return Object.assign({},p,{memo:e.target.value.slice(0,20)}); }); }}
                      placeholder="例：大きなケヤキ"
                      style={{ width:"100%", padding:"10px 0 8px", fontSize:15, border:"none", borderBottom:"1.5px solid " + C.ink,
                        outline:"none", fontFamily:SERIF, background:"transparent", color:C.ink, boxSizing:"border-box", marginBottom:20 }}/>
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={function(){ setLandmarks(function(p){ const n=Object.assign({},p); delete n[editLM.key]; return n; }); setEditLM(null); }}
                        style={{ flex:1, padding:"10px", border:"1px solid " + C.inkBorder, background:"transparent", color:C.red, fontSize:12, cursor:"pointer", fontFamily:SERIF }}>削除</button>
                      <button onClick={function(){
                        setLandmarks(function(p){ return Object.assign({},p,{[editLM.key]:Object.assign({},p[editLM.key],{memo:editLM.memo||""})}); });
                        setEditLM(null);
                      }} style={{ flex:2, padding:"10px", border:"2px solid " + C.ink, background:C.ink, color:C.paper, fontSize:12, cursor:"pointer", fontFamily:SERIF }}>保存</button>
                    </div>
                  </div>
                </div>
              );
            })()}

            <div style={{ marginTop:16 }}><InkBtn onClick={function(){ setStep(4); }} primary={true}>次へ</InkBtn></div>
          </div>
        )}

        {sn === "name" && (
          <div>
            <div style={{ marginBottom:24 }}>
              <div style={{ fontSize:11, color:C.inkFaint, letterSpacing:3, marginBottom:4, fontFamily:HAND }}>第三記 —</div>
              <h2 style={{ fontSize:22, fontWeight:"normal", letterSpacing:4, marginBottom:8 }}>畑の名称</h2>
            </div>

            {/* 畑の名称 */}
            <div style={{ marginBottom:24 }}>
              <div style={{ fontSize:10, color:C.inkFaint, letterSpacing:3, marginBottom:6, fontFamily:HAND }}>畑の名称</div>
              <input value={name} onChange={function(e){ setName(e.target.value.slice(0,15)); }} placeholder="例：南の畑"
                style={{ width:"100%", padding:"14px 0 10px", fontSize:18, borderRadius:0, outline:"none",
                  fontFamily:SERIF, boxSizing:"border-box", letterSpacing:2, color:C.ink,
                  background:"transparent", border:"none", borderBottom:"2px solid " + C.ink }}/>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:10 }}>
                {["南の畑","北の畑","家の裏","第一圃場","ばあちゃんの畑"].map(function(n){
                  return (
                    <button key={n} onClick={function(){ setName(n); }}
                      style={{ padding:"5px 12px", border:"1px solid " + (name===n?C.ink:C.inkLine),
                        background:name===n?C.ink:"transparent", color:name===n?C.paper:C.inkFaint,
                        fontSize:12, cursor:"pointer", fontFamily:SERIF, letterSpacing:1 }}>{n}</button>
                  );
                })}
              </div>
            </div>

            <RuledLine mb={16}/>
            <LedgerRow label="名称" value={name||"（未入力）"}/>
            <LedgerRow label="区画数" value={cols+"列×"+rows+"行（"+ac+"区画　≈ "+(ac*sqm).toFixed(1)+"㎡）"}/>
            <LedgerRow label="北の方角" value={DIRS8.find(function(d){return d.id===northDir;})?.label || northDir}/>
            {Object.keys(landmarks).length > 0 && <LedgerRow label="目印" value={Object.keys(landmarks).length+"件"}/>}
            <div style={{ marginTop:24 }}><InkBtn onClick={function(){ setStep(5); }} primary={true}>帳簿に登録する</InkBtn></div>
          </div>
        )}

        {/* ━━ 完了 ━━ */}
        {sn === "done" && (
          <div style={{ textAlign:"center" }}>
            <div style={{ padding:"36px 0 28px" }}>
              <div style={{ display:"inline-block", marginBottom:24 }}>
                <Hanko text="登録" sub="済" color={C.indigo}/>
              </div>
              <h2 style={{ fontSize:20, fontWeight:"normal", letterSpacing:4, marginBottom:10 }}>
                {name||"畑"} を登録しました
              </h2>
              <p style={{ fontSize:12, color:C.inkFaint, letterSpacing:1 }}>{cols}列×{rows}行　{ac}区画</p>
              {Object.keys(landmarks).length > 0 && <p style={{ fontSize:12, color:C.inkFaint, marginTop:4, letterSpacing:1 }}>目印 {Object.keys(landmarks).length}件　北：{DIRS8.find(function(d){return d.id===northDir;})?.label}</p>}
            </div>

            <OutlineBtn onClick={function(){ setStep(1); setRows(4); setCols(5); setGrid(makeGrid(4,5)); setName(""); setLandmarks({}); setNorthDir("N"); }}>
              ＋ もう一つ登録する
            </OutlineBtn>
            <div style={{ marginTop:10 }}><InkBtn onClick={done} primary={true}>ハタケボをひらく</InkBtn></div>

/* ══════════════════════════════════════
   畑マップ（帳簿ビュー）
══════════════════════════════════════ */
function FarmMap({ farms, plantings, setPlantings, ridges, setRidges, onAddFarm, onDeleteFarm, onExport, onImport }) {
  const cy = new Date().getFullYear();
  const [fid, setFid]       = useState(farms[0]?farms[0].id:"");
  const [year, setYear]     = useState(cy);
  const [selCell, setSelCell] = useState(null);
  const [tab, setTab]       = useState("plant");
  const [cfm, setCfm]       = useState(false);
  /* 前回入力した植え付け月日を引き継ぐ */
  const [sharedMonth, setSharedMonth] = useState(null);
  const [sharedDay,   setSharedDay]   = useState(null);
  const [rm, setRm]         = useState(false);
  const [ro, setRo]         = useState("H");
  const [s1, setS1]         = useState(null);
  const [hov, setHov]       = useState(null);
  const [selRid, setSelRid] = useState(null);
  const [showPrint, setShowPrint] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const farm = farms.find(function(f){ return f.id===fid; }) || farms[0];
  const fyr  = (ridges[fid]&&ridges[fid][year]) || {};
  const rl   = buildRL(fyr);

  /* rec = {vid, month, day} or null */
  function gp(key){
    const rec=(plantings[fid]&&plantings[fid][year]&&plantings[fid][year][key])||null;
    return extractVid(rec);
  }
  function gpFull(key){
    const rec=(plantings[fid]&&plantings[fid][year]&&plantings[fid][year][key])||null;
    if(!rec) return null;
    if(typeof rec==="object") return rec;
    return {vid:rec, month:null, day:null};
  }
  function sp(key, vid, plantYear, month, day){
    const yr = plantYear || year;
    setPlantings(function(prev){
      const fd=prev[fid]||{}, fy=fd[yr]||{};
      const rec={vid:vid, month:month||null, day:day||null};
      return Object.assign({},prev,{[fid]:Object.assign({},fd,{[yr]:Object.assign({},fy,{[key]:rec})})});
    });
  }
  function cp(key){
    setPlantings(function(prev){
      const fd=prev[fid]||{}, fy=Object.assign({},fd[year]||{});
      delete fy[key];
      return Object.assign({},prev,{[fid]:Object.assign({},fd,{[year]:fy})});
    });
  }
  function gh(key){
    const fd=plantings[fid]||{};
    return Object.entries(fd)
      .filter(function(e){ return parseInt(e[0])!==year; })
      .sort(function(a,b){ return b[0]-a[0]; })
      .map(function(e){
        const rec=e[1][key];
        const vid=extractVid(rec);
        const full=(rec&&typeof rec==="object")?rec:{vid:vid,month:null,day:null};
        return {year:parseInt(e[0]),veggieId:vid,month:full.month,day:full.day};
      })
      .filter(function(h){ return h.veggieId; });
  }
  function close(){ setSelCell(null); setCfm(false); setSelRid(null); }

  function inDraft(r,c){
    if(!s1||!hov) return false;
    if(ro==="H"&&s1.r===hov.r) return r===s1.r&&c>=Math.min(s1.c,hov.c)&&c<=Math.max(s1.c,hov.c);
    if(ro==="V"&&s1.c===hov.c) return c===s1.c&&r>=Math.min(s1.r,hov.r)&&r<=Math.max(s1.r,hov.r);
    return false;
  }
  function isS1(r,c){ return s1&&s1.r===r&&s1.c===c; }
  function createRidge(r,c){
    if(!s1){setS1({r:r,c:c});return;}
    if(ro==="H"&&s1.r!==r){setS1({r:r,c:c});return;}
    if(ro==="V"&&s1.c!==c){setS1({r:r,c:c});return;}
    if(s1.r===r&&s1.c===c){setS1(null);return;}
    const id="ridge_"+Date.now();
    const nr={id:id,orientation:ro,r1:Math.min(s1.r,r),c1:Math.min(s1.c,c),r2:Math.max(s1.r,r),c2:Math.max(s1.c,c)};
    setRidges(function(prev){
      const fd=prev[fid]||{}, fy=fd[year]||{};
      return Object.assign({},prev,{[fid]:Object.assign({},fd,{[year]:Object.assign({},fy,{[id]:nr})})});
    });
    setS1(null);setHov(null);setRm(false);
  }
  function delRidge(id){
    setRidges(function(prev){
      const fd=prev[fid]||{}, fy=Object.assign({},fd[year]||{});
      delete fy[id];
      return Object.assign({},prev,{[fid]:Object.assign({},fd,{[year]:fy})});
    });
    setSelRid(null);
  }
  function cancel(){ setRm(false);setS1(null);setHov(null); }

  const totCells = farm ? farm.grid.flat().filter(Boolean).length : 0;
  const plantedN = farm ? farm.grid.flat().filter(function(a,i){
    if(!a)return false; const r=Math.floor(i/farm.cols),c=i%farm.cols; return !!gp(r+"-"+c);
  }).length : 0;
  const warnN = farm ? farm.grid.flat().filter(function(a,i){
    if(!a)return false; const r=Math.floor(i/farm.cols),c=i%farm.cols; return !!checkRot(fid,r+"-"+c,year,plantings);
  }).length : 0;
  const ridgeCount = Object.keys(fyr).length;

  const pageLines = {
    backgroundImage:"repeating-linear-gradient(transparent,transparent 27px,"+C.inkLine+"30 27px,"+C.inkLine+"30 28px)",
  };

  return (
    <div style={Object.assign({minHeight:"100vh",background:C.paper,fontFamily:SERIF,color:C.ink,userSelect:"none"},pageLines)} onClick={close}>

      {/* ヘッダー */}
      <div style={{ position:"sticky", top:0, background:C.paper2, zIndex:20, borderBottom:"2px solid " + C.ink }}>
        {/* タブ行 */}
        <div style={{ display:"flex", alignItems:"center", overflowX:"auto", borderBottom:"1px solid " + C.inkLine }}>
          {farms.map(function(f){
            const active = fid===f.id;
            return (
              <button key={f.id} onClick={function(e){ e.stopPropagation(); setFid(f.id); setSelCell(null); cancel(); setConfirmDelete(false); }}
                style={{ background:active?C.paper:"transparent", border:"none",
                  borderRight:"1px solid " + C.inkLine,
                  borderBottom:active?"2px solid " + C.paper:"none",
                  cursor:"pointer", padding:"12px 18px", fontSize:13,
                  fontFamily:SERIF, color:active?C.ink:C.inkFaint,
                  letterSpacing:1, flexShrink:0, marginBottom: active?-2:0 }}>
                {f.name}
              </button>
            );
          })}
          <button onClick={function(e){ e.stopPropagation(); onAddFarm(); }}
            style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, color:C.inkFaint, fontFamily:SERIF, padding:"12px", flexShrink:0, marginLeft:"auto" }}>
            ＋ 追加
          </button>
        </div>

        {/* 削除確認バー */}
        {confirmDelete && farm && (
          <div onClick={function(e){ e.stopPropagation(); }} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 16px", background:C.redPale, borderBottom:"1px solid " + C.red }}>
            <span style={{ flex:1, fontSize:12, color:C.red, fontFamily:HAND, letterSpacing:1 }}>「{farm.name}」を削除しますか？　この操作は元に戻せません。</span>
            <button onClick={function(e){ e.stopPropagation(); setConfirmDelete(false); }}
              style={{ padding:"5px 14px", border:"1px solid " + C.inkBorder, background:"transparent", fontSize:12, cursor:"pointer", fontFamily:SERIF, color:C.inkFaint }}>
              やめる
            </button>
            <button onClick={function(e){
              e.stopPropagation();
              const remainFarms = farms.filter(function(f){ return f.id!==fid; });
              onDeleteFarm(fid);
              setConfirmDelete(false);
              if (remainFarms.length > 0) setFid(remainFarms[0].id);
            }}
              style={{ padding:"5px 14px", border:"1px solid " + C.red, background:C.red, color:"#fff", fontSize:12, cursor:"pointer", fontFamily:SERIF }}>
              削除する
            </button>
          </div>
        )}

        {/* 年ナビ + ツールバー */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <button onClick={function(e){ e.stopPropagation(); setYear(function(y){ return y-1; }); }}
              style={{ background:"none", border:"1px solid " + C.inkBorder, width:30, height:30, cursor:"pointer", fontSize:14, color:C.inkFaint, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:SERIF }}>‹</button>
            <div style={{ minWidth:72, textAlign:"center" }}>
              <span style={{ fontSize:14, letterSpacing:3, fontFamily:HAND }}>{year}</span>
              <span style={{ fontSize:10, color:C.inkFaint, marginLeft:3, fontFamily:HAND }}>年</span>
            </div>
            <button onClick={function(e){ e.stopPropagation(); setYear(function(y){ return y+1; }); }} disabled={year>=cy}
              style={{ background:"none", border:"1px solid " + C.inkBorder, width:30, height:30, cursor:"pointer", fontSize:14, color:C.inkFaint, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:SERIF, opacity:year>=cy?.3:1 }}>›</button>
          </div>
          <div style={{ display:"flex", gap:10, alignItems:"center" }}>
            {warnN > 0 && (
              <div style={{ display:"flex", alignItems:"center", gap:4, color:C.red, fontSize:11, fontFamily:HAND }}>
                <span>⚠</span><span>{warnN}件の連作</span>
              </div>
            )}
            <span style={{ fontSize:11, color:C.inkFaint, fontFamily:HAND }}>{plantedN}/{totCells}</span>
            <button onClick={function(e){ e.stopPropagation(); if(rm)cancel(); else{setRm(true);close();} }}
              style={{ padding:"5px 12px", border:"1px solid " + (rm?C.ink:C.inkBorder),
                background:rm?C.ink:"transparent", color:rm?C.paper:C.inkFaint,
                fontSize:11, cursor:"pointer", fontFamily:SERIF, letterSpacing:1 }}>
              {rm?"× 畝モード終了":"畝を引く"}
            </button>
            <button onClick={function(e){ e.stopPropagation(); setShowPrint(true); }}
              style={{ padding:"5px 12px", border:"1px solid " + C.inkBorder,
                background:"transparent", color:C.inkFaint,
                fontSize:11, cursor:"pointer", fontFamily:SERIF, letterSpacing:1,
                display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:13 }}>🖨</span> 印刷
            </button>
            {/* バックアップ・復元 */}
            <button onClick={function(e){ e.stopPropagation(); onExport(); }}
              style={{ padding:"5px 12px", border:"1px solid " + C.inkBorder,
                background:"transparent", color:C.inkFaint,
                fontSize:11, cursor:"pointer", fontFamily:SERIF, letterSpacing:1,
                display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:13 }}>💾</span> 保存
            </button>
            <label style={{ padding:"5px 12px", border:"1px solid " + C.inkBorder,
                background:"transparent", color:C.inkFaint,
                fontSize:11, cursor:"pointer", fontFamily:SERIF, letterSpacing:1,
                display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:13 }}>📂</span> 読込
              <input type="file" accept=".json" onChange={function(e){ e.stopPropagation(); onImport(e); }} style={{ display:"none" }}/>
            </label>
            <button onClick={function(e){ e.stopPropagation(); setConfirmDelete(function(v){ return !v; }); close(); }}
              style={{ padding:"5px 12px", border:"1px solid " + (confirmDelete?C.red:C.inkBorder),
                background:confirmDelete?C.redPale:"transparent", color:confirmDelete?C.red:C.inkFaint,
                fontSize:11, cursor:"pointer", fontFamily:SERIF, letterSpacing:1 }}>
              畑を削除
            </button>
          </div>
        </div>

        {/* 畝モードバー */}
        {rm && (
          <div style={{ borderTop:"1px solid " + C.inkLine, padding:"7px 16px", display:"flex", alignItems:"center", gap:14, background:C.paper }}>
            <div style={{ display:"flex", gap:6 }}>
              {[{id:"H",label:"横畝"},{id:"V",label:"縦畝"}].map(function(o){
                return (
                  <button key={o.id} onClick={function(e){ e.stopPropagation(); setRo(o.id); setS1(null); }}
                    style={{ padding:"4px 12px", border:"1px solid " + (ro===o.id?C.ink:C.inkBorder),
                      background:ro===o.id?C.ink:"transparent", color:ro===o.id?C.paper:C.inkFaint,
                      fontSize:11, cursor:"pointer", fontFamily:SERIF }}>
                    {o.label}
                  </button>
                );
              })}
            </div>
            <span style={{ fontSize:11, color:C.inkFaint, fontFamily:HAND }}>
              {!s1?"始点をタップ →":"終点をタップして確定"}
            </span>
          </div>
        )}
      </div>

      {/* 帳面エリア */}
      <div style={{ overflowX:"auto", padding:"24px 16px 200px" }} onClick={function(e){ e.stopPropagation(); }}>
        {farm && (
          <div style={{ display:"inline-block" }}>

            {/* 帳面タイトル */}
            <div style={{ marginBottom:12, paddingLeft:28, display:"flex", alignItems:"baseline", gap:12 }}>
              <span style={{ fontSize:11, color:C.inkFaint, letterSpacing:3, fontFamily:HAND }}>作付け帳</span>
              <span style={{ fontSize:13, color:C.ink, letterSpacing:2, fontFamily:HAND }}>{farm.name}</span>
              <span style={{ fontSize:11, color:C.inkFaint, fontFamily:HAND }}>{year}年</span>
            </div>

            {/* 北の方角 + 目印 + グリッド */}
            {(function(){
              const lm = farm.landmarks || {};
              const hasLm = Object.keys(lm).length > 0;
              const northAngles = {N:0,NE:45,E:90,SE:135,S:180,SW:225,W:270,NW:315};
              const northAngle  = northAngles[farm.northDir] || 0;
              const northLabel  = DIRS8.find(function(d){ return d.id===farm.northDir; });
              const LM_CELL = CELL; /* 目印セルをグリッドセルに合わせる */
              const ROW_NUM_W = 28;

              /* 目印セル共通スタイル */
              function lmStyle(w, h, hasItem) {
                return {
                  width:w, height:h, flexShrink:0,
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  gap:1, fontSize:10, color:C.inkFaint, fontFamily:HAND,
                  border: hasItem ? "1px dashed " + C.inkLine : "none",
                  background: hasItem ? C.paper2 : "transparent",
                  borderRadius:2, padding:"2px 1px", boxSizing:"border-box",
                };
              }

              return (
                <div>
                  {/* 北の方角ラベル */}
                  <div style={{ paddingLeft:ROW_NUM_W, marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:18, display:"inline-block", transform:"rotate("+northAngle+"deg)", lineHeight:1, color:C.indigo }}>↑</span>
                    <span style={{ fontSize:10, color:C.indigo, fontFamily:HAND, letterSpacing:2 }}>北</span>
                  </div>

                  {/* 上の目印 */}
                  {hasLm && (
                    <div style={{ display:"flex", paddingLeft:ROW_NUM_W, gap:2, marginBottom:2 }}>
                      {Array.from({length:farm.cols}, function(_,c){
                        const l = lm["top-"+c];
                        return (
                          <div key={c} style={lmStyle(LM_CELL, 40, !!l)}>
                            {l && <span style={{ fontSize:16, lineHeight:1 }}>{l.icon}</span>}
                            {l && <span style={{ fontSize:8, color:C.inkFaint, textAlign:"center", lineHeight:1.2 }}>{l.label}</span>}
                            {l && l.memo && <span style={{ fontSize:7, color:C.inkLine, textAlign:"center" }}>{l.memo}</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* 列ヘッダー */}
                  <div style={{ display:"flex", gap:2, marginLeft:ROW_NUM_W, marginBottom:2 }}>
                    {Array.from({length:farm.cols}, function(_,c){
                      return <div key={c} style={{ width:LM_CELL, textAlign:"center", fontSize:10, color:C.inkFaint, fontFamily:HAND }}>
                        {String.fromCharCode(65+c)}
                      </div>;
                    })}
                  </div>

                  {/* 左・グリッド・右 */}
                  <div style={{ display:"flex", gap:2, alignItems:"flex-start" }}>

                    {/* 左の目印 */}
                    {hasLm && (
                      <div style={{ display:"flex", flexDirection:"column", gap:2, marginRight:2 }}>
                        {Array.from({length:farm.rows}, function(_,r){
                          const l = lm["lft-"+r];
                          return (
                            <div key={r} style={lmStyle(40, LM_CELL, !!l)}>
                              {l && <span style={{ fontSize:14, lineHeight:1 }}>{l.icon}</span>}
                              {l && <span style={{ fontSize:7, color:C.inkFaint, writingMode:"vertical-rl", textOrientation:"mixed", lineHeight:1.2 }}>{l.label}</span>}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* グリッド本体 */}
                    <div style={{ display:"inline-flex", flexDirection:"column", gap:2,
                      border:"2px solid " + C.ink, background:C.paper,
                      boxShadow:"4px 4px 0 " + C.inkLine }}>
                      {Array.from({length:farm.rows}, function(_,r){
                        return (
                          <div key={r} style={{ display:"flex", gap:2, borderBottom: r<farm.rows-1?"1px solid " + C.inkLine+"60":"none" }}>
                            {/* 行番号 */}
                            <div style={{ width:ROW_NUM_W, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"flex-end",
                              paddingRight:4, fontSize:10, color:C.inkFaint, fontFamily:HAND,
                              borderRight:"1px solid " + C.inkLine+"60" }}>{r+1}</div>
                            {Array.from({length:farm.cols}, function(_,c){
                              const active = farm.grid[r]&&farm.grid[r][c];
                              const key    = r+"-"+c;
                              const vid    = gp(key);
                              const dateRec= gpFull(key);
                              const warn   = checkRot(fid,key,year,plantings);
                              const isSel  = selCell===key;
                              const ri     = rl[key];
                              const dark   = !!ri||inDraft(r,c)||isS1(r,c);
                              return (
                                <LedgerCell key={c}
                                  vid={vid} dateRec={dateRec} warn={warn} selected={isSel}
                                  inactive={!active} ridge={dark?ri:null}
                                  coord={String.fromCharCode(65+c)+(r+1)}
                                  onClick={!active?null:function(e){
                                    e.stopPropagation();
                                    if(rm){createRidge(r,c);return;}
                                    setSelCell(key);setTab("plant");setCfm(false);
                                  }}
                                  onMouseEnter={function(){ if(rm&&s1) setHov({r:r,c:c}); }}
                                />
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>

                    {/* 右の目印 */}
                    {hasLm && (
                      <div style={{ display:"flex", flexDirection:"column", gap:2, marginLeft:2 }}>
                        {Array.from({length:farm.rows}, function(_,r){
                          const l = lm["rgt-"+r];
                          return (
                            <div key={r} style={lmStyle(40, LM_CELL, !!l)}>
                              {l && <span style={{ fontSize:14, lineHeight:1 }}>{l.icon}</span>}
                              {l && <span style={{ fontSize:7, color:C.inkFaint, writingMode:"vertical-rl", textOrientation:"mixed", lineHeight:1.2 }}>{l.label}</span>}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* 下の目印 */}
                  {hasLm && (
                    <div style={{ display:"flex", paddingLeft:ROW_NUM_W+(hasLm?44:0), gap:2, marginTop:2 }}>
                      {Array.from({length:farm.cols}, function(_,c){
                        const l = lm["bot-"+c];
                        return (
                          <div key={c} style={lmStyle(LM_CELL, 40, !!l)}>
                            {l && <span style={{ fontSize:16, lineHeight:1 }}>{l.icon}</span>}
                            {l && <span style={{ fontSize:8, color:C.inkFaint, textAlign:"center", lineHeight:1.2 }}>{l.label}</span>}
                            {l && l.memo && <span style={{ fontSize:7, color:C.inkLine, textAlign:"center" }}>{l.memo}</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* 凡例 */}
            <div style={{ marginTop:14, paddingLeft:28, display:"flex", gap:16, flexWrap:"wrap" }}>
              {[
                {bg:C.inkFaint,bd:C.ink,label:"作付け済"},
                {bg:C.indigoPale,bd:C.indigo,label:"選択中"},
                {bg:"#e8e0c8",bd:C.inkBorder,label:"畝"},
              ].map(function(x){
                return (
                  <div key={x.label} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:C.inkFaint }}>
                    <div style={{ width:12, height:12, background:x.bg, border:"1px solid " + x.bd }}/>{x.label}
                  </div>
                );
              })}
              {[{c:C.red,l:"連作 危"},{c:C.orange,l:"連作 注"}].map(function(x){
                return (
                  <div key={x.l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:C.inkFaint }}>
                    <div style={{ width:12, height:12, border:"2px solid " + x.c }}/>{x.l}
                  </div>
                );
              })}
            </div>

            {/* 畝一覧 */}
            {ridgeCount > 0 && !rm && (
              <div style={{ marginTop:20, paddingLeft:28 }}>
                <SectionTitle>畝一覧</SectionTitle>
                {Object.values(fyr).map(function(ridge, i){
                  const len = ridge.orientation==="H"?ridge.c2-ridge.c1+1:ridge.r2-ridge.r1+1;
                  const sL  = String.fromCharCode(65+ridge.c1)+(ridge.r1+1);
                  const eL  = String.fromCharCode(65+ridge.c2)+(ridge.r2+1);
                  const sel = selRid===ridge.id;
                  return (
                    <div key={ridge.id} onClick={function(e){ e.stopPropagation(); setSelRid(sel?null:ridge.id); setSelCell(null); }}
                      style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0",
                        borderBottom:"1px solid " + C.inkLine, cursor:"pointer",
                        background: sel?C.indigoPale:"transparent" }}>
                      <div style={{ width:16, height:16, background:"#e8e0c8", border:"1px solid " + C.inkBorder, flexShrink:0 }}/>
                      <div style={{ flex:1 }}>
                        <span style={{ fontSize:13, letterSpacing:1 }}>{i+1}番畝</span>
                        <span style={{ fontSize:11, color:C.inkFaint, marginLeft:10, fontFamily:HAND }}>
                          {ridge.orientation==="H"?"横畝":"縦畝"}　{sL}→{eL}　{len}区画
                        </span>
                      </div>
                      {sel && (
                        <button onClick={function(e){ e.stopPropagation(); delRidge(ridge.id); }}
                          style={{ background:"none", border:"1px solid " + C.red, color:C.red, padding:"3px 10px", fontSize:11, cursor:"pointer", fontFamily:SERIF }}>
                          削除
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

          </div>
        )}
      </div>

      {/* ボトムシート */}
      {selCell && farm && (
        <LedgerSheet cellKey={selCell} year={year}
          veggieId={gp(selCell)} fullRec={gpFull(selCell)} history={gh(selCell)}
          warning={checkRot(fid,selCell,year,plantings)}
          tab={tab} onTabChange={setTab}
          confirmClear={cfm} onConfirmClear={setCfm}
          onSelect={function(id,plantYear,month,day){
            sp(selCell,id,plantYear,month,day);
            setSharedMonth(month||null);
            setSharedDay(day||null);
            close();
          }}
          onClear={function(){ cp(selCell); close(); }}
          onClose={close} farmId={fid} plantings={plantings} year={year}
          initMonth={sharedMonth} initDay={sharedDay}
          ridgeInfo={rl[selCell]}/>
      )}
      {showPrint && farm && (
        <PrintModal farm={farm} year={year} farms={farms} plantings={plantings} ridges={ridges}
          onClose={function(){ setShowPrint(false); }}/>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   ボトムシート（帳簿記入シート）
══════════════════════════════════════ */
function LedgerSheet({ cellKey, year, veggieId, fullRec, history, warning, tab, onTabChange, confirmClear, onConfirmClear, onSelect, onClear, onClose, farmId, plantings, ridgeInfo, initMonth, initDay }) {
  const parts = cellKey.split("-");
  const r = parseInt(parts[0]), c = parseInt(parts[1]);
  const colLbl = String.fromCharCode(65+c);
  const vg = veggieId ? VM[veggieId] : null;
  const inR = !!ridgeInfo;

  /* 日付ステート — 既存レコード → 引き継ぎ日付 → null の優先順位 */
  const [selMonth, setSelMonth] = useState(function(){
    if(fullRec&&fullRec.month) return fullRec.month;
    return initMonth||null;
  });
  const [selDay,   setSelDay]   = useState(function(){
    if(fullRec&&fullRec.day) return fullRec.day;
    return initDay||null;
  });
  /* 野菜選択の仮ステート（タップ後に日付入力を表示してから確定） */
  const [pendingVid, setPendingVid] = useState(null);

  const rc  = !inR ? [] : (function(){
    const ridge=ridgeInfo.ridge, cells=[];
    if(ridge.orientation==="H"){ for(let cc=ridge.c1;cc<=ridge.c2;cc++) cells.push(ridge.r1+"-"+cc); }
    else { for(let rr=ridge.r1;rr<=ridge.r2;rr++) cells.push(rr+"-"+ridge.c1); }
    return cells;
  })();

  return (
    <div onClick={function(e){ e.stopPropagation(); }}
      style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:40,
        background:C.paper, borderTop:"3px solid " + C.ink,
        borderRadius:"14px 14px 0 0",
        boxShadow:"0 -8px 40px rgba(28,20,8,0.18)",
        maxHeight:"78vh", display:"flex", flexDirection:"column",
        fontFamily:SERIF,
        backgroundImage:"repeating-linear-gradient(transparent,transparent 27px,"+C.inkLine+"28 27px,"+C.inkLine+"28 28px)",
      }}>

      <div style={{ padding:"12px 24px 0" }}>
        <div style={{ width:36, height:3, background:C.inkLine, borderRadius:2, margin:"0 auto 14px" }}/>

        {/* 畝バナー */}
        {inR && (
          <div style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 14px", marginBottom:12,
            background:C.paper2, border:"1px solid " + C.inkBorder }}>
            <div style={{ width:14, height:14, background:"#e8e0c8", border:"1px solid " + C.inkBorder, flexShrink:0 }}/>
            <span style={{ fontSize:12, color:C.inkFaint, letterSpacing:1, fontFamily:HAND }}>
              {ridgeInfo.ridge.orientation==="H"?"横畝":"縦畝"}　{rc.length}区画中 {ridgeInfo.pos+1}番目
            </span>
          </div>
        )}

        {/* セルヘッダー */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            {vg ? (
              <div style={{ width:52, height:52, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                border:"1px solid " + C.inkLine, background:C.paper2 }}>
                <VeggieStamp id={vg.id} size={44}/>
              </div>
            ) : (
              <div style={{ width:52, height:52, display:"flex", alignItems:"center", justifyContent:"center",
                border:"1px dashed " + C.inkLine, background:"transparent", color:C.inkFaint, fontSize:24 }}>空</div>
            )}
            <div>
              <div style={{ fontSize:16, letterSpacing:2, fontFamily:HAND }}>{colLbl}{r+1} 区画</div>
              <div style={{ fontSize:12, color:C.inkFaint, marginTop:3, fontFamily:HAND }}>
                {vg ? vg.name + "（" + vg.family + "）" : "未記入"}
              </div>
              {vg && (
                <div style={{ fontSize:11, color:C.indigo, marginTop:2, fontFamily:HAND, letterSpacing:1 }}>
                  {year}年{selMonth ? selMonth+"月" : ""}{selDay ? selDay+"日" : ""}
                </div>
              )}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", fontSize:20, color:C.inkFaint, fontFamily:SERIF }}>×</button>
        </div>

        {/* 警告 */}
        {warning && (
          <div style={{ display:"flex", gap:10, alignItems:"center", padding:"9px 14px", marginBottom:10,
            borderLeft:"4px solid " + (warning==="danger"?C.red:C.orange),
            background:warning==="danger"?C.redPale:C.orangePale }}>
            <Hanko text={warning==="danger"?"危":"注"} color={warning==="danger"?C.red:C.orange}/>
            <div>
              <div style={{ fontSize:12, fontWeight:"bold", color:warning==="danger"?C.red:C.orange, fontFamily:HAND, letterSpacing:1 }}>
                {warning==="danger"?"連作障害 危険":"連作障害 注意"}
              </div>
              <div style={{ fontSize:11, color:C.inkFaint, marginTop:2, fontFamily:HAND }}>
                {warning==="danger"?"3年以上同じ科が連続しています":"前年と同じ科の野菜です"}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* タブ */}
      <div style={{ display:"flex", borderBottom:"2px solid " + C.ink, padding:"0 24px" }}>
        {[{id:"plant",label:"作付け記入"},{id:"history",label:"過去の記録"}].map(function(t){
          return (
            <button key={t.id} onClick={function(){ onTabChange(t.id); }}
              style={{ padding:"8px 0", marginRight:24, border:"none", background:"none", cursor:"pointer",
                fontFamily:SERIF, fontSize:12, letterSpacing:2,
                color:tab===t.id?C.ink:C.inkFaint,
                borderBottom:tab===t.id?"3px solid " + C.ink:"3px solid transparent" }}>
              {t.label}
            </button>
          );
        })}
      </div>

      <div style={{ overflowY:"auto", flex:1, padding:"14px 24px 24px" }}>

        {/* ━━ 作付け記入タブ ━━ */}
        {tab === "plant" && (
          <div>
            {/* 畝ミニプレビュー */}
            {inR && rc.length > 1 && (
              <div style={{ marginBottom:20 }}>
                <SectionTitle>この畝の状況</SectionTitle>
                <div style={{ display:"flex", flexDirection:ridgeInfo.ridge.orientation==="H"?"row":"column", gap:4 }}>
                  {rc.map(function(ck){
                    const pts = ck.split("-");
                    const rr=parseInt(pts[0]), cc=parseInt(pts[1]);
                    const vid2 = (plantings[farmId]&&plantings[farmId][year]&&plantings[farmId][year][ck])||null;
                    const vgg = vid2?VM[vid2]:null;
                    const isCur = ck===cellKey;
                    return (
                      <div key={ck} style={{ flex:1, minWidth:0, border:"1px solid " + (isCur?C.ink:C.inkLine),
                        background:isCur?C.indigoPale:C.paper, padding:4, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                        {vgg ? <VeggieStamp id={vgg.id} size={32}/> : <span style={{ fontSize:18, color:C.inkFaint, lineHeight:1.2 }}>—</span>}
                        <div style={{ fontSize:8, color:C.inkFaint, fontFamily:HAND }}>{vgg?vgg.name:""}</div>
                        <div style={{ fontSize:7, color:C.inkLine, fontFamily:HAND }}>{String.fromCharCode(65+cc)}{rr+1}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <SectionTitle>{year}年の作物を選ぶ</SectionTitle>

            {/* 野菜グリッド */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:16 }}>
              {VEGGIES.map(function(v){
                const wP    = checkPrev(farmId, cellKey, v.id, year, plantings);
                const isCur = veggieId===v.id;
                const isPend = pendingVid===v.id;
                return (
                  <button key={v.id} onClick={function(){
                    if(pendingVid===v.id){ setPendingVid(null); }
                    else { setPendingVid(v.id); }
                  }}
                    style={{ border:"1.5px solid " + (isPend?C.indigo:isCur?C.ink:C.inkLine),

function HistRow({ year, month, day, veggieId, isCurrent }) {
  const v = veggieId ? VM[veggieId] : null;
  const dateStr = month ? (year + "年" + month + "月" + (day ? day + "日" : "")) : (year + "年");
  return (
    <div style={{ display:"flex", alignItems:"center", gap:14, padding:"10px 0", borderBottom:"1px solid " + C.inkLine }}>
      <div style={{ width:72, flexShrink:0 }}>
        <div style={{ fontSize:13, color:isCurrent?C.indigo:C.inkFaint, fontFamily:HAND, letterSpacing:1 }}>{dateStr}</div>
        {isCurrent && <span style={{ fontSize:8, background:C.indigo, color:"#fff", padding:"1px 4px", fontFamily:HAND }}>本年</span>}
      </div>
      {v ? (
        <Fragment>
          <div style={{ width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid " + C.inkLine }}>
            <VeggieStamp id={v.id} size={32}/>
          </div>
          <div>
            <div style={{ fontSize:14, letterSpacing:1 }}>{v.name}</div>
            <div style={{ fontSize:10, color:C.inkFaint, fontFamily:HAND }}>{v.family}</div>
          </div>
        </Fragment>
      ) : (
        <span style={{ fontSize:12, color:C.inkFaint, fontFamily:HAND }}>— 記録なし</span>
      )}
    </div>
  );
}

function RotSummary({ year, veggieId, history }) {
  const entries = (veggieId?[{year:year,veggieId:veggieId}]:[]).concat(history).sort(function(a,b){return b.year-a.year;});
  const fams = entries.map(function(e){ return VM[e.veggieId]&&VM[e.veggieId].family; }).filter(Boolean);
  let maxC=1, cur=1;
  for (let i=1; i<fams.length; i++) {
    if(fams[i]===fams[i-1]){ cur++; if(cur>maxC) maxC=cur; } else cur=1;
  }
  if (entries.length < 2) return null;
  const good = maxC < 2;
  return (
    <div style={{ marginTop:16, padding:"14px 16px",
      borderLeft:"4px solid " + (maxC>=3?C.red:maxC>=2?C.orange:C.green),
      background: maxC>=3?C.redPale:maxC>=2?C.orangePale:C.greenPale }}>
      <div style={{ fontSize:11, color:C.inkFaint, letterSpacing:3, marginBottom:6, fontFamily:HAND }}>連作チェック</div>
      {maxC>=3 && <div style={{ fontSize:13, color:C.red, fontFamily:HAND, letterSpacing:.5 }}>同じ科が{maxC}年連続。土の休養が必要です。</div>}
      {maxC===2 && <div style={{ fontSize:13, color:C.orange, fontFamily:HAND, letterSpacing:.5 }}>2年連続。来年は別の科をお勧めします。</div>}
      {good     && <div style={{ fontSize:13, color:C.green, fontFamily:HAND, letterSpacing:.5 }}>連作の問題はありません。</div>}
    </div>
  );
}

                          <div className="grid-col-header">
                            {Array.from({length:farm.cols}, function(_,c) {
                              return <div key={c} className="grid-col-label">{String.fromCharCode(65+c)}</div>;
                            })}
                          </div>
                          <div className="grid-body">
                            {Array.from({length:farm.rows}, function(_,r) {
                              return (
                                <div key={r} className="grid-row">
                                  <div className="grid-row-num">{r+1}</div>
                                  {Array.from({length:farm.cols}, function(_,c) {
                                    const active = farm.grid[r]&&farm.grid[r][c];
                                    const key = r+"-"+c;
                                    const vid  = gpY(y, key);
                                    const vg   = vid ? VM[vid] : null;
                                    const warn = getWarn(y, key);
                                    const ri   = fyRidge[key];
                                    let cls = "grid-cell";
                                    if (!active) cls += " inactive";
                                    else if (ri) cls += " ridge";
                                    if (warn) cls += " " + warn;
                                    return (
                                      <div key={c} className={cls}>
                                        {active && vg && (
                                          <Fragment>
                                            <div className="cell-mark">{vg.mark}</div>
                                            <div className="cell-name">{vg.name}</div>
                                            <div className="cell-family">{vg.family}</div>
                                            {(function(){ const dr=gpDateY(y,key); return dr&&dr.month?<div className="cell-date">{dr.month}月{dr.day?dr.day+"日":""}</div>:null; })()}
                                          </Fragment>
                                        )}
                                        {active && !vg && <div className="cell-empty">—</div>}
                                        {active && <div className="cell-coord">{String.fromCharCode(65+c)}{r+1}</div>}
                                        {active && warn && <div className={"cell-warn " + warn}>{warn==="danger"?"危":"注"}</div>}
                                      </div>
                                    );
                                  })}
                                </div>
                              );
                            })}
                          </div>
                        </div>

                        {/* 右の目印 */}
                        {hasAnyLm && (
                          <div className="lm-col">
                            <div className="lm-col-spacer"/>
                            {Array.from({length:farm.rows}, function(_,r) {
                              const l = getLm("rgt-"+r);
                              return (
                                <div key={r} className={"lm-v" + (l?"":" empty")}>
                                  {l && <span className="lm-icon">{l.icon}</span>}
                                  {l && <span className="lm-label">{l.label}</span>}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>

                      {/* 下の目印 */}
                      {hasAnyLm && (
                        <div className="lm-bot-row">
                          {Array.from({length:farm.cols}, function(_,c) {
                            const l = getLm("bot-"+c);
                            return (
                              <div key={c} className={"lm-h" + (l?"":" empty")}>
                                {l && <span className="lm-icon">{l.icon}</span>}
                                {l && <span className="lm-label">{l.label}</span>}
                                {l && l.memo && <span className="lm-label">{l.memo}</span>}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    <div className="legend">
                      <div className="legend-item"><div className="legend-box" style={{background:"#ece4d0",borderColor:"#a09070"}}/> 畝</div>
                      <div className="legend-item"><div className="legend-box" style={{borderColor:"#8a2020"}}/> 連作 危険</div>
                      <div className="legend-item"><div className="legend-box" style={{borderColor:"#8a5010"}}/> 連作 注意</div>
                    </div>
                  </div>
                );
              })}

              <div className="footer">
                <span>ハタケボ 作付け帳</span>
                <span>{farm.name}　印刷日：{new Date().toLocaleDateString("ja-JP")}</span>
              </div>
            </div>
          </div>

          {/* 印刷ボタン */}
          <div style={{ borderTop:"1px solid " + C.inkLine, paddingTop:20, display:"flex", gap:10 }}>
            <button onClick={onClose}
              style={{ flex:1, padding:"12px", border:"1px solid " + C.inkBorder, background:"transparent", color:C.inkFaint, fontSize:13, cursor:"pointer", fontFamily:SERIF, letterSpacing:1 }}>
              とじる
            </button>
            <button onClick={doPrint}
              style={{ flex:2, padding:"12px", border:"2px solid " + C.ink, background:C.ink, color:C.paper, fontSize:14, cursor:"pointer", fontFamily:SERIF, letterSpacing:2, boxShadow:"3px 3px 0 " + C.inkFaint, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <span>🖨</span> 印刷する
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HatakeApp />);
  </script>
</body>
</html>
